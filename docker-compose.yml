services:
  bot:
    build: .
    container_name: mathtrainer_bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mathtrainer_net

  postgres:
    image: postgres:16-alpine
    container_name: mathtrainer_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mathtrainer}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ports exposed only within Docker network — do NOT expose externally on VPS
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d mathtrainer" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mathtrainer_net

  redis:
    image: redis:7-alpine
    container_name: mathtrainer_redis
    restart: unless-stopped
    # ports exposed only within Docker network — do NOT expose externally on VPS
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - mathtrainer_net

  minio:
    image: minio/minio:latest
    container_name: mathtrainer_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mathtrainer_net

  minio-init:
    image: minio/mc:latest
    container_name: mathtrainer_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} && if ! mc ls local/${S3_BUCKET_NAME:-mathtrainer} > /dev/null 2>&1; then
        mc mb local/${S3_BUCKET_NAME:-mathtrainer}
      fi
      if [ \"${MINIO_BUCKET_PUBLIC:-false}\" = \"true\" ]; then
        mc anonymous set public local/${S3_BUCKET_NAME:-mathtrainer}
      fi "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-mathtrainer}
      MINIO_BUCKET_PUBLIC: ${MINIO_BUCKET_PUBLIC:-false}
    networks:
      - mathtrainer_net

volumes:
  postgres_data:
  minio_data:


networks:
  mathtrainer_net:
    driver: bridge
