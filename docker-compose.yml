services:
  bot:
    build: .
    container_name: mathtrainer_bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mathtrainer_net

  postgres:
    image: postgres:16-alpine
    container_name: mathtrainer_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mathtrainer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mathtrainer"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mathtrainer_net

  redis:
    image: redis:7-alpine
    container_name: mathtrainer_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - mathtrainer_net

volumes:
  postgres_data:

networks:
  mathtrainer_net:
    driver: bridge
